<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Video Studio</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --tg-bg: var(--tg-theme-bg-color, #17212b);
  --tg-sec: var(--tg-theme-secondary-bg-color, #232e3c);
  --tg-text: var(--tg-theme-text-color, #f5f5f5);
  --tg-hint: var(--tg-theme-hint-color, #708499);
  --tg-link: var(--tg-theme-link-color, #62a8dc);
  --tg-btn: var(--tg-theme-button-color, #5288c1);
  --tg-btn-text: var(--tg-theme-button-text-color, #ffffff);
  --accent: #6c63ff;
  --accent2: #a78bfa;
  --surface: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --radius: 12px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  background: var(--tg-bg);
  color: var(--tg-text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  min-height: 100%;
  padding-bottom: calc(72px + var(--safe-bottom));
  -webkit-tap-highlight-color: transparent;
}

/* Scroll area */
.page { padding: 0 0 1rem; }

/* Section header */
.section {
  padding: 14px 16px 0;
}
.section + .section { padding-top: 8px; }
.section-title {
  font-size: 12px; font-weight: 500; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--tg-hint);
  padding: 0 4px; margin-bottom: 8px;
}

/* Cards — Telegram native look */
.tg-card {
  background: var(--tg-sec);
  border-radius: var(--radius);
  overflow: hidden;
}
.tg-row {
  display: flex; align-items: center;
  padding: 13px 16px; gap: 12px;
  position: relative;
}
.tg-row + .tg-row::before {
  content: ''; position: absolute;
  top: 0; left: 16px; right: 0;
  height: 0.5px; background: var(--border2);
}
.row-icon {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 16px;
}
.row-icon.purple { background: rgba(108,99,255,0.18); }
.row-icon.blue   { background: rgba(98,168,220,0.18); }
.row-icon.green  { background: rgba(60,212,130,0.15); }
.row-icon.amber  { background: rgba(245,158,11,0.15); }
.row-body { flex: 1; min-width: 0; }
.row-label { font-size: 15px; color: var(--tg-text); }
.row-sub { font-size: 12px; color: var(--tg-hint); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-right { color: var(--tg-hint); font-size: 14px; flex-shrink: 0; }
.row-right svg { display: block; opacity: 0.4; }

/* Input fields */
.tg-input-wrap {
  background: var(--tg-sec);
  border-radius: var(--radius);
  padding: 12px 14px;
  display: flex; align-items: center; gap: 10px;
}
.tg-input-wrap input, .tg-input-wrap textarea {
  background: none; border: none; outline: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px; color: var(--tg-text);
  flex: 1; width: 100%; resize: none;
  line-height: 1.5;
}
.tg-input-wrap input::placeholder,
.tg-input-wrap textarea::placeholder { color: var(--tg-hint); }
.tg-input-wrap .input-icon { color: var(--tg-hint); flex-shrink: 0; }
.eye-toggle {
  background: none; border: none; cursor: pointer;
  color: var(--tg-hint); padding: 2px; flex-shrink: 0;
  transition: color 0.15s;
}
.eye-toggle:hover { color: var(--tg-text); }
textarea { min-height: 80px; }

/* Model selector */
.models-list { background: var(--tg-sec); border-radius: var(--radius); overflow: hidden; }
.model-item {
  display: flex; align-items: center;
  padding: 12px 16px; gap: 12px; cursor: pointer;
  position: relative; transition: background 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.model-item + .model-item::before {
  content: ''; position: absolute;
  top: 0; left: 56px; right: 0;
  height: 0.5px; background: var(--border);
}
.model-item:active { background: rgba(255,255,255,0.04); }
.model-radio {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid var(--tg-hint); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.15s, background 0.15s;
}
.model-item.selected .model-radio {
  border-color: var(--accent); background: var(--accent);
}
.model-item.selected .model-radio::after {
  content: ''; width: 8px; height: 8px;
  background: white; border-radius: 50%;
}
.model-info { flex: 1; min-width: 0; }
.model-name { font-size: 15px; color: var(--tg-text); }
.model-meta { font-size: 12px; color: var(--tg-hint); margin-top: 2px; }
.model-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.mbadge {
  font-size: 10px; padding: 2px 7px; border-radius: 20px;
  font-weight: 500;
}
.mbadge-p { background: rgba(108,99,255,0.18); color: #a78bfa; }
.mbadge-g { background: rgba(60,212,130,0.15); color: #6ee7b7; }
.mbadge-a { background: rgba(245,158,11,0.15); color: #fcd34d; }
.mbadge-b { background: rgba(98,168,220,0.15); color: #93c5fd; }
.mbadge-gray { background: rgba(255,255,255,0.08); color: var(--tg-hint); }

/* Param selects */
.param-grid {
  background: var(--tg-sec); border-radius: var(--radius); overflow: hidden;
}
.param-row {
  display: flex; align-items: center;
  padding: 13px 16px; gap: 12px;
  position: relative; cursor: pointer;
}
.param-row + .param-row::before {
  content: ''; position: absolute; top: 0; left: 16px; right: 0;
  height: 0.5px; background: var(--border);
}
.param-label { flex: 1; font-size: 15px; }
.param-value {
  font-size: 14px; color: var(--tg-hint);
  display: flex; align-items: center; gap: 6px;
}
.param-value svg { opacity: 0.4; }
select.hidden-select {
  position: absolute; inset: 0; opacity: 0; width: 100%; cursor: pointer;
}

/* Cost bar */
.cost-bar {
  background: rgba(108,99,255,0.1);
  border: 1px solid rgba(108,99,255,0.2);
  border-radius: var(--radius);
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.cost-label { font-size: 13px; color: var(--tg-hint); }
.cost-value {
  font-family: 'Syne', sans-serif;
  font-size: 16px; font-weight: 700; color: var(--accent2);
}

/* Status */
.status-card {
  border-radius: var(--radius); padding: 14px 16px;
  font-size: 14px; line-height: 1.6; display: none;
  margin-top: 2px;
}
.status-card.visible { display: block; }
.status-card.working {
  background: rgba(108,99,255,0.1); border: 1px solid rgba(108,99,255,0.22);
  color: var(--accent2);
}
.status-card.done {
  background: rgba(60,212,130,0.08); border: 1px solid rgba(60,212,130,0.2);
  color: #6ee7b7;
}
.status-card.error {
  background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
  color: #fca5a5;
}
.spinner {
  display: inline-block; width: 13px; height: 13px;
  border: 2px solid currentColor; border-top-color: transparent;
  border-radius: 50%; animation: spin 0.65s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.progress-bar {
  height: 2px; background: rgba(255,255,255,0.08);
  border-radius: 2px; margin-top: 10px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
  animation: prog 2.5s ease-in-out infinite; transform-origin: left;
}
@keyframes prog { 0%{transform:scaleX(0)}50%{transform:scaleX(0.65)}100%{transform:scaleX(1)} }

/* Video */
.video-section { display: none; padding: 0 16px; }
.video-section.visible { display: block; }
.video-section .section-title { padding: 0 4px; margin: 12px 0 8px; }
.video-wrap {
  border-radius: var(--radius); overflow: hidden;
  background: #000; border: 1px solid var(--border);
}
video { width: 100%; display: block; max-height: 300px; object-fit: contain; }
.video-actions { display: flex; gap: 8px; margin-top: 8px; }
.v-btn {
  flex: 1; padding: 12px 8px; border-radius: 10px; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
  text-align: center; text-decoration: none; display: flex;
  align-items: center; justify-content: center; gap: 6px;
  border: 1px solid var(--border2); background: var(--tg-sec);
  color: var(--tg-text); transition: opacity 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.v-btn:active { opacity: 0.7; }
.v-btn.primary {
  background: rgba(108,99,255,0.15); border-color: rgba(108,99,255,0.3);
  color: var(--accent2);
}

/* History */
.history-section { display: none; }
.history-section.visible { display: block; }
.history-grid {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 6px;
  padding: 0 16px;
}
.hist-item {
  aspect-ratio: 16/9; border-radius: 8px; overflow: hidden;
  background: #000; border: 1px solid var(--border); cursor: pointer;
}
.hist-item video { width: 100%; height: 100%; object-fit: cover; }

/* Main bottom button area */
.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--tg-bg); padding: 10px 16px;
  padding-bottom: calc(10px + var(--safe-bottom));
  border-top: 0.5px solid var(--border);
  z-index: 100; display: flex; gap: 8px;
}
.gen-btn {
  flex: 1; padding: 13px; border-radius: 12px; border: none; cursor: pointer;
  font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
  background: linear-gradient(135deg, var(--accent), #9c88ff);
  color: white; box-shadow: 0 4px 20px rgba(108,99,255,0.35);
  transition: opacity 0.15s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.gen-btn:active { transform: scale(0.98); }
.gen-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* Header */
.app-header {
  padding: 16px 16px 8px;
  display: flex; align-items: center; gap: 10px;
}
.app-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), #9c88ff);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 12px rgba(108,99,255,0.35);
}
.app-icon svg { width: 18px; height: 18px; fill: white; }
.app-title {
  font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700;
}
.app-sub { font-size: 12px; color: var(--tg-hint); margin-top: 1px; }

/* Loading overlay */
.overlay {
  position: fixed; inset: 0; z-index: 200;
  background: var(--tg-bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  transition: opacity 0.3s;
}
.overlay.hidden { opacity: 0; pointer-events: none; }
.overlay-spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(108,99,255,0.2);
  border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
.overlay-text { font-size: 14px; color: var(--tg-hint); }
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="overlay-spinner"></div>
  <div class="overlay-text">Загрузка...</div>
</div>

<div class="page" id="mainPage" style="display:none">
  <!-- Header -->
  <div class="app-header">
    <div class="app-icon">
      <svg viewBox="0 0 24 24"><path d="M15 10l4.553-2.069A1 1 0 0121 8.87v6.26a1 1 0 01-1.447.9L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/></svg>
    </div>
    <div>
      <div class="app-title">AI Video Studio</div>
      <div class="app-sub">Генератор видео на базе ИИ</div>
    </div>
  </div>

  <!-- API Key -->
  <div class="section">
    <div class="section-title">API Ключ OpenRouter</div>
    <div class="tg-input-wrap">
      <span class="input-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
      </span>
      <input type="password" id="apiKey" placeholder="sk-or-v1-..." autocomplete="off" />
      <button class="eye-toggle" onclick="toggleKey()">
        <svg width="16" height="16" id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <div style="display:flex;gap:8px;margin-top:6px">
      <div id="keyStatus" style="font-size:12px;color:var(--tg-hint);flex:1;padding:2px 4px"></div>
      <button onclick="loadModels()" style="background:rgba(108,99,255,0.18);border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:500;color:var(--accent2);cursor:pointer" id="loadBtn">
        Загрузить модели
      </button>
    </div>
  </div>

  <!-- Prompt -->
  <div class="section">
    <div class="section-title">Промпт</div>
    <div class="tg-input-wrap">
      <textarea id="prompt" placeholder="A cinematic drone shot over misty mountains at golden hour, slow motion, 4K quality..." oninput="autoResize(this)"></textarea>
    </div>
  </div>

  <!-- Models -->
  <div class="section" id="modelsSection">
    <div class="section-title">Модель</div>
    <div class="models-list" id="modelsList">
      <div style="padding:16px;text-align:center;color:var(--tg-hint);font-size:14px">
        Введите API ключ и загрузите модели
      </div>
    </div>
  </div>

  <!-- Parameters -->
  <div class="section">
    <div class="section-title">Параметры</div>
    <div class="param-grid">
      <div class="param-row">
        <div class="param-label">Разрешение</div>
        <div class="param-value" id="resLabel">720p
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <select class="hidden-select" id="resolution" onchange="syncLabel('resolution','resLabel');updateCost()">
          <option value="720p">720p</option>
          <option value="1080p">1080p</option>
        </select>
      </div>
      <div class="param-row">
        <div class="param-label">Формат</div>
        <div class="param-value" id="aspectLabel">16:9 горизонталь
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <select class="hidden-select" id="aspect" onchange="syncLabel('aspect','aspectLabel')">
          <option value="16:9">16:9 горизонталь</option>
          <option value="9:16">9:16 вертикаль</option>
          <option value="1:1">1:1 квадрат</option>
          <option value="4:3">4:3 классика</option>
          <option value="21:9">21:9 ultra-wide</option>
        </select>
      </div>
      <div class="param-row">
        <div class="param-label">Длительность</div>
        <div class="param-value" id="durLabel">6 секунд
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <select class="hidden-select" id="duration" onchange="syncLabel('duration','durLabel');updateCost()">
          <option value="4">4 секунды</option>
          <option value="5">5 секунд</option>
          <option value="6" selected>6 секунд</option>
          <option value="7">7 секунд</option>
          <option value="8">8 секунд</option>
        </select>
      </div>
      <div class="param-row">
        <div class="param-label">Аудио</div>
        <div class="param-value" id="audioLabel">Со звуком
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <select class="hidden-select" id="audio" onchange="syncLabel('audio','audioLabel')">
          <option value="true">Со звуком</option>
          <option value="false">Без звука</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Cost -->
  <div class="section">
    <div class="cost-bar">
      <span class="cost-label">Примерная стоимость</span>
      <span class="cost-value" id="costLabel">≈ $0.30</span>
    </div>
  </div>

  <!-- Status -->
  <div class="section" id="statusWrap">
    <div class="status-card" id="statusBox"></div>
  </div>

  <!-- Video Result -->
  <div class="video-section" id="videoSection">
    <div class="section-title">Результат</div>
    <div class="video-wrap">
      <video id="videoEl" controls autoplay loop playsinline></video>
    </div>
    <div class="video-actions">
      <a id="dlBtn" class="v-btn primary" target="_blank">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Скачать
      </a>
      <button class="v-btn" onclick="generate()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
        Ещё раз
      </button>
    </div>
  </div>

  <!-- History -->
  <div class="history-section" id="historySection">
    <div class="section" style="padding-bottom:0">
      <div class="section-title">История</div>
    </div>
    <div class="history-grid" id="historyGrid"></div>
  </div>

  <div style="height:8px"></div>
</div>

<!-- Bottom bar -->
<div class="bottom-bar">
  <button class="gen-btn" id="genBtn" onclick="generate()">▶ Создать видео</button>
</div>

<script>
const tg = window.Telegram?.WebApp;
let apiKey = '', selectedModel = null, models = [];

// Init TMA
(function init() {
  if (tg) {
    tg.ready();
    tg.expand();
    document.documentElement.style.setProperty('--tg-bg', tg.themeParams.bg_color || '#17212b');
    document.documentElement.style.setProperty('--tg-sec', tg.themeParams.secondary_bg_color || '#232e3c');
    document.documentElement.style.setProperty('--tg-text', tg.themeParams.text_color || '#f5f5f5');
    document.documentElement.style.setProperty('--tg-hint', tg.themeParams.hint_color || '#708499');
    document.documentElement.style.setProperty('--tg-link', tg.themeParams.link_color || '#62a8dc');
    document.documentElement.style.setProperty('--tg-btn', tg.themeParams.button_color || '#5288c1');
  }
  // Restore saved key
  const saved = localStorage.getItem('or_api_key');
  if (saved) {
    document.getElementById('apiKey').value = saved;
    document.getElementById('keyStatus').textContent = 'Ключ сохранён';
    loadModels(true);
  }
  setTimeout(() => {
    document.getElementById('overlay').classList.add('hidden');
    document.getElementById('mainPage').style.display = 'block';
  }, 600);
})();

function haptic(type = 'light') {
  tg?.HapticFeedback?.impactOccurred(type);
}

function toggleKey() {
  const inp = document.getElementById('apiKey');
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  document.getElementById('eyeIcon').innerHTML = show
    ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
}

function syncLabel(selectId, labelId) {
  const sel = document.getElementById(selectId);
  const lbl = document.getElementById(labelId);
  const opt = sel.options[sel.selectedIndex];
  lbl.firstChild.textContent = opt.text + ' ';
  haptic('light');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

const FALLBACK = [
  { id:'google/veo-3.1-lite', name:'Veo 3.1 Lite', desc:'Google · $0.05/сек', badges:[{t:'Дешёвый',c:'mbadge-p'},{t:'Аудио',c:'mbadge-b'}] },
  { id:'google/veo-3.1-fast', name:'Veo 3.1 Fast', desc:'Google · $0.10/сек', badges:[{t:'Баланс',c:'mbadge-g'},{t:'Аудио',c:'mbadge-b'}] },
  { id:'google/veo-3.1',      name:'Veo 3.1',      desc:'Google · $0.50/сек', badges:[{t:'Премиум',c:'mbadge-a'}] },
  { id:'openai/sora-2-pro',   name:'Sora 2 Pro',   desc:'OpenAI · $0.60/сек', badges:[{t:'Премиум',c:'mbadge-a'}] },
  { id:'bytedance/seedance-2.0',      name:'Seedance 2.0',      desc:'ByteDance · $0.08/сек', badges:[{t:'Качество',c:'mbadge-g'}] },

async function loadModels(silent = false) {
  const keyVal = document.getElementById('apiKey').value.trim();
  if (!keyVal) { tg ? tg.showAlert('Введите API ключ') : alert('Введите API ключ'); return; }
  apiKey = keyVal;
  localStorage.setItem('or_api_key', apiKey);
  if (!silent) haptic('medium');

  const btn = document.getElementById('loadBtn');
  const stat = document.getElementById('keyStatus');
  btn.textContent = '...'; btn.disabled = true;
  stat.textContent = 'Загрузка моделей...'; stat.style.color = 'var(--accent2)';

  try {
    const r = await fetch('https://openrouter.ai/api/v1/videos/models', {
      headers: { 'Authorization': 'Bearer ' + apiKey }
    });
    if (r.ok) {
      const d = await r.json();
      models = (d.data || []).map(m => ({
        id: m.id || m.canonical_slug,
        name: m.name || m.id,
        desc: ((m.id||'').split('/')[0]) + (m.pricing_skus?.['per-video-second'] ? ` · $${m.pricing_skus['per-video-second']}/сек` : ''),
        cost_per_sec: m.pricing_skus?.['per-video-second'] ? +m.pricing_skus['per-video-second'] : 0.05,
        badges: [],
      }));
      stat.textContent = `✓ Загружено ${models.length} моделей`;
      stat.style.color = '#6ee7b7';
    } else throw new Error('Ошибка API');
  } catch(e) {
    if (!models.length) models = FALLBACK;
    stat.textContent = models === FALLBACK ? 'Используются стандартные модели' : '✓ Модели загружены';
    stat.style.color = 'var(--tg-hint)';
  }

  if (!models.length) models = FALLBACK;
  renderModels();
  btn.textContent = 'Обновить'; btn.disabled = false;
}

function renderModels() {
  const list = document.getElementById('modelsList');
  list.innerHTML = '';
  models.forEach((m, i) => {
    const el = document.createElement('div');
    el.className = 'model-item' + (selectedModel === m.id || (!selectedModel && i === 0) ? ' selected' : '');
    if (!selectedModel && i === 0) selectedModel = m.id;
    el.innerHTML = `
      <div class="model-radio"></div>
      <div class="model-info">
        <div class="model-name">${m.name}</div>
        <div class="model-meta">${m.desc}</div>
        ${m.badges?.length ? `<div class="model-badges">${m.badges.map(b=>`<span class="mbadge ${b.c}">${b.t}</span>`).join('')}</div>` : ''}
      </div>`;
    el.onclick = () => {
      selectedModel = m.id;
      list.querySelectorAll('.model-item').forEach(x => x.classList.remove('selected'));
      el.classList.add('selected');
      haptic('light');
      updateCost();
    };
    list.appendChild(el);
  });
  updateCost();
}

function updateCost() {
  const dur = +document.getElementById('duration').value;
  const res = document.getElementById('resolution').value;
  const m = models.find(x => x.id === selectedModel);
  let cps = m?.cost_per_sec || 0.05;
  if (res === '1080p') cps *= 1.5;
  document.getElementById('costLabel').textContent = `≈ $${(dur * cps).toFixed(2)} · ${dur}с`;
}

function setStatus(html, type) {
  const box = document.getElementById('statusBox');
  box.className = 'status-card visible ' + type;
  box.innerHTML = html;
  box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
function hideStatus() {
  document.getElementById('statusBox').className = 'status-card';
}

async function generate() {
  apiKey = document.getElementById('apiKey').value.trim();
  const prompt = document.getElementById('prompt').value.trim();
  if (!apiKey) { tg ? tg.showAlert('Введите API ключ') : alert('Введите API ключ'); return; }
  if (!prompt) { tg ? tg.showAlert('Введите промпт') : alert('Введите промпт'); return; }
  if (!selectedModel) { tg ? tg.showAlert('Выберите модель') : alert('Выберите модель'); return; }

  haptic('medium');
  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  document.getElementById('videoSection').classList.remove('visible');

  const body = {
    model: selectedModel,
    prompt,
    resolution: document.getElementById('resolution').value,
    aspect_ratio: document.getElementById('aspect').value,
    duration: +document.getElementById('duration').value,
    generate_audio: document.getElementById('audio').value === 'true',
  };

  setStatus(`<span class="spinner"></span> Отправляем запрос…<br><span style="opacity:.7;font-size:12px">${selectedModel}</span><div class="progress-bar"><div class="progress-fill"></div></div>`, 'working');

  try {
    const r = await fetch('https://openrouter.ai/api/v1/videos', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + apiKey,
        'Content-Type': 'application/json',
        'HTTP-Referer': location.href,
        'X-Title': 'AI Video Studio TMA',
      },
      body: JSON.stringify(body),
    });
    if (!r.ok) {
      const e = await r.json().catch(() => ({}));
      throw new Error(e.error?.message || `HTTP ${r.status}`);
    }
    const job = await r.json();
    const pollUrl = job.polling_url || `https://openrouter.ai/api/v1/videos/${job.id}`;
    poll(pollUrl, job.id, 0);
  } catch(e) {
    setStatus('❌ ' + e.message, 'error');
    btn.disabled = false;
    haptic('error');
  }
}

async function poll(url, jobId, attempt) {
  try {
    const r = await fetch(url, { headers: { 'Authorization': 'Bearer ' + apiKey } });
    const d = await r.json();
    if (d.status === 'completed') {
      const videoUrl = d.unsigned_urls?.[0] || `https://openrouter.ai/api/v1/videos/${jobId}/content?index=0`;
      const cost = d.usage?.cost ? ` · $${d.usage.cost.toFixed(3)}` : '';
      setStatus('✓ Готово!' + cost, 'done');
      haptic('success');
      document.getElementById('videoEl').src = videoUrl;
      document.getElementById('dlBtn').href = videoUrl;
      document.getElementById('videoSection').classList.add('visible');
      document.getElementById('videoSection').scrollIntoView({ behavior: 'smooth' });
      addHistory(videoUrl);
      document.getElementById('genBtn').disabled = false;
    } else if (d.status === 'failed') {
      throw new Error(d.error || 'Ошибка генерации');
    } else {
      const labels = { pending: 'В очереди', in_progress: 'Генерируется' };
      const lbl = labels[d.status] || d.status;
      setStatus(`<span class="spinner"></span> ${lbl}… (${attempt*15}с)<div class="progress-bar"><div class="progress-fill"></div></div>`, 'working');
      setTimeout(() => poll(url, jobId, attempt + 1), 15000);
    }
  } catch(e) {
    setStatus('❌ ' + e.message, 'error');
    document.getElementById('genBtn').disabled = false;
    haptic('error');
  }
}

function addHistory(url) {
  const sec = document.getElementById('historySection');
  const grid = document.getElementById('historyGrid');
  sec.classList.add('visible');
  const el = document.createElement('div');
  el.className = 'hist-item';
  const v = document.createElement('video');
  v.src = url; v.muted = true; v.loop = true; v.playsInline = true;
  el.appendChild(v);
  el.onclick = () => {
    document.getElementById('videoEl').src = url;
    document.getElementById('dlBtn').href = url;
    document.getElementById('videoSection').classList.add('visible');
    document.getElementById('videoSection').scrollIntoView({ behavior: 'smooth' });
    haptic('light');
  };
  v.addEventListener('mouseenter', () => v.play());
  v.addEventListener('mouseleave', () => v.pause());
  grid.prepend(el);
}
</script>
